<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IT Helpdesk Agent</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, Segoe UI, Arial, sans-serif; margin: 0; background: #f3f4f6; }
    header { background: #0f172a; color: #fff; padding: 14px 20px; font-weight: 600; }
    #chat { max-width: 760px; margin: 20px auto; padding: 0 16px; }
    .msg { padding: 10px 14px; border-radius: 12px; margin: 8px 0; white-space: pre-wrap; line-height: 1.4; }
    .user { background: #2563eb; color: #fff; margin-left: 20%; }
    .bot { background: #fff; border: 1px solid #e5e7eb; margin-right: 20%; }
    .route { font-size: 11px; color: #6b7280; margin: 2px 0 10px 0; }
    form { display: flex; gap: 8px; max-width: 760px; margin: 0 auto 24px; padding: 0 16px; }
    input { flex: 1; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 15px; }
    button { padding: 12px 18px; border: 0; border-radius: 10px; background: #2563eb; color: #fff; font-size: 15px; cursor: pointer; }
    button:disabled { opacity: .6; cursor: default; }
    .thinking { color: #6b7280; font-style: italic; }
    .handoff {
      display: inline-flex; align-items: center; gap: 6px;
      background: #eef2ff; color: #3730a3; border: 1px solid #c7d2fe;
      border-radius: 999px; padding: 4px 12px; font-size: 12px; font-weight: 600;
      margin: 4px 0 8px 0; margin-right: 20%;
    }
    .handoff::before {
      content: ''; width: 8px; height: 8px; border-radius: 50%;
      background: #6366f1; animation: handoff-pulse 1s ease-in-out infinite;
    }
    @keyframes handoff-pulse {
      0%, 100% { opacity: .35; } 50% { opacity: 1; }
    }
    .thinking::after {
      content: '…';
      display: inline-block;
      animation: think-dots 1.2s steps(4, end) infinite;
      width: 1.2em; text-align: left; overflow: hidden; vertical-align: bottom;
    }
    @keyframes think-dots {
      0%   { clip-path: inset(0 100% 0 0); }
      100% { clip-path: inset(0 0 0 0); }
    }
  </style>
</head>
<body>
  <header>ServiceNow IT Helpdesk Agent</header>
  <div id="chat">
    <div class="msg bot">Hi! Describe your IT issue, look up an incident (e.g. INC0000057), or ask me to create or update a ticket.</div>
  </div>
  <form id="f">
    <input id="m" autocomplete="off" placeholder="Type your request…" required />
    <button id="send" type="submit">Send</button>
  </form>
  <script>
    const chat = document.getElementById('chat');
    const form = document.getElementById('f');
    const input = document.getElementById('m');
    const send = document.getElementById('send');
    const turns = [];

    function add(text, cls, role) {
      const d = document.createElement('div');
      d.className = 'msg ' + cls;
      d.textContent = text;
      chat.appendChild(d);
      chat.scrollTop = chat.scrollHeight;
      if (role) {
        turns.push({ role, content: text });
      }
      return d;
    }

    async function readChatResponse(res) {
      const contentType = res.headers.get('content-type') || '';
      if (!contentType.includes('application/json')) {
        const text = await res.text();
        throw new Error(res.ok
          ? 'Agent returned a non-JSON response.'
          : `Agent returned HTTP ${res.status}: ${text || res.statusText}`);
      }

      let data;
      try {
        data = await res.json();
      } catch (err) {
        throw new Error('Agent returned invalid JSON: ' + err.message);
      }

      if (!res.ok) {
        throw new Error(data.reply || data.error || `Agent returned HTTP ${res.status}.`);
      }
      return data;
    }

    function renderRoute(route) {
      if (route && route.length) {
        const r = document.createElement('div');
        r.className = 'route';
        r.textContent = 'routed via: ' + route.join(' \u2192 ');
        chat.appendChild(r);
        chat.scrollTop = chat.scrollHeight;
      }
    }

    // Fallback: the original blocking POST /api/chat call.
    async function fallbackChat(message, history, bubble) {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, history })
      });
      const data = await readChatResponse(res);
      const reply = data.reply || '(no response)';
      bubble.classList.remove('thinking');
      bubble.textContent = reply;
      renderRoute(data.route);
      turns.push({ role: 'assistant', content: reply });
      chat.scrollTop = chat.scrollHeight;
    }

    // Stream the reply token-by-token from POST /api/chat/stream (SSE over fetch).
    async function streamChat(message, history, bubble) {
      const res = await fetch('/api/chat/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, history })
      });
      if (!res.ok || !res.body) {
        throw new Error(`stream unavailable (HTTP ${res.status})`);
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let text = '';
      let started = false;
      let route = [];
      let sawTerminal = false;

      // Live handoff indicator: a small chip showing which agent the
      // orchestrator is calling. Inserted just before the reply bubble.
      let chip = null;
      const showHandoff = (label) => {
        if (!label) return;
        if (!chip) {
          chip = document.createElement('div');
          chip.className = 'handoff';
          chat.insertBefore(chip, bubble);
        }
        chip.textContent = label;
        chat.scrollTop = chat.scrollHeight;
      };
      const clearHandoff = () => {
        if (chip) { chip.remove(); chip = null; }
      };

      const handleEvent = (payload) => {
        if (payload.type === 'status') {
          showHandoff(payload.label);
        } else if (payload.type === 'token') {
          if (!started) {
            started = true;
            clearHandoff();
            bubble.classList.remove('thinking');
            bubble.textContent = '';
          }
          text += payload.text;
          bubble.textContent = text;
          chat.scrollTop = chat.scrollHeight;
        } else if (payload.type === 'done') {
          sawTerminal = true;
          clearHandoff();
          route = payload.route || [];
        } else if (payload.type === 'error') {
          sawTerminal = true;
          clearHandoff();
          bubble.classList.remove('thinking');
          text = payload.text || 'The agent reported an error.';
          bubble.textContent = text;
        }
      };

      const flushLine = (line) => {
        const trimmed = line.replace(/\r$/, '');
        if (!trimmed.startsWith('data:')) return;
        const raw = trimmed.slice(5).trim();
        if (!raw) return;
        try {
          handleEvent(JSON.parse(raw));
        } catch (_e) { /* ignore malformed frame */ }
      };

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        let idx;
        while ((idx = buffer.indexOf('\n')) >= 0) {
          flushLine(buffer.slice(0, idx));
          buffer = buffer.slice(idx + 1);
        }
      }
      if (buffer) flushLine(buffer);

      if (!started && !sawTerminal) {
        clearHandoff();
        throw new Error('stream closed before any content');
      }
      renderRoute(route);
      turns.push({ role: 'assistant', content: text || '(no response)' });
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const message = input.value.trim();
      if (!message) return;
      const history = turns.slice(-10);
      add(message, 'user', 'user');
      input.value = '';
      send.disabled = true;

      const bubble = document.createElement('div');
      bubble.className = 'msg bot thinking';
      bubble.textContent = 'Thinking';
      chat.appendChild(bubble);
      chat.scrollTop = chat.scrollHeight;

      try {
        try {
          await streamChat(message, history, bubble);
        } catch (streamErr) {
          // Streaming failed to start — fall back to the blocking endpoint so
          // the UI still works.
          bubble.classList.add('thinking');
          bubble.textContent = 'Thinking';
          await fallbackChat(message, history, bubble);
        }
      } catch (err) {
        bubble.classList.remove('thinking');
        bubble.textContent = 'Error contacting the agent: ' + err;
      } finally {
        send.disabled = false;
        input.focus();
      }
    });
  </script>
</body>
</html>
